# =======================================
# Deployment Configuration
# =======================================
containers:
  image:
    # repository: ghcr.io/<GITHUB_OWNER>/api-fastapi
    # tag: "dev"
    repository: ghcr.io/leodev901/vehicle-manual-bot/backend
    tag: "latest"
    pullPolicy: Always
  resources:
    replicas: 1
    requests:
      cpu: "256m"
      memory: "256Mi"
    limits:
      cpu: "512m"
      memory: "512Mi"

# =======================================
# Service Configuration
# =======================================
service:
  port: 80
  targetPort: 8080
  worker: 1
        
# =======================================
# Environment Variables
# =======================================
env:
  app_name: "Vehicle Manual Bot API"
  app_host: "0.0.0.0"
  app_port: "8080"
  app_log_level: "debug"

  # Supabase
  supabase_url: "github-secret-supabase-url"
  supabase_key: "github-secret-supabase-key"

  # Database
  database_url: "github-secret-database-url"

  # LLM
  default_provider: "openai"
  openai_api_key: "github-secret-openai-api-key"
  openai_model: "gpt-5-nano"
  gemini_api_key: "github-secret-gemini-api-key"
  gemini_model: "gemini-2.5-flash-lite"

  # Hugging Face
  hf_inference_url: "https://leodev901-inference-server.hf.space/api/v1/embed"
  hf_token: "github-secret-hf-token"