name: backend - CI Push GHCR

on:
  push:
    branches: ["main"]
    paths:
      - "backend/Dockerfile"
      - "backend/requirements.txt"
      - "backend/helm/**"
      - ".github/workflows/backend-ci.yaml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Registry Image Tag name (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------
      # 1️⃣ set values and secrets (sed 로 치환)
      # -------------------------------------------------
      - name: set values and secrets
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # ── 브랜치·이미지 태그 결정 ───────────────────────
          BRANCH=${{ github.ref_name }}
          if [[ "$BRANCH" == "main" ]]; then
            DEPLOY_ENV=prd
          elif [[ "$BRANCH" == "develop" ]]; then
            DEPLOY_ENV=dev
          else
            DEPLOY_ENV=dev
          fi

          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG=${{ github.event.inputs.image_tag }}
          else
            TAG=latest
          fi

          echo "BRANCH=$BRANCH"         >> $GITHUB_ENV
          echo "DEPLOY_ENV=$DEPLOY_ENV" >> $GITHUB_ENV
          echo "TAG=$TAG"               >> $GITHUB_ENV

          # ── values.yaml 복사 & 시크릿 치환 ─────────────────
          cp backend/helm/$DEPLOY_ENV-values.yaml backend/helm/values.yaml
          FILE="backend/helm/values.yaml"

          # github-secret-… 문자열을 실제 시크릿 값으로 교체
          sed -i "s|github-secret-supabase-url|$SUPABASE_URL|g" "$FILE"
          sed -i "s|github-secret-supabase-key|$SUPABASE_KEY|g" "$FILE"
          sed -i "s|github-secret-database-url|$DATABASE_URL|g" "$FILE"
          sed -i "s|github-secret-openai-api-key|$OPENAI_API_KEY|g" "$FILE"
          sed -i "s|github-secret-gemini-api-key|$GEMINI_API_KEY|g" "$FILE"
          sed -i "s|github-secret-hf-token|$HF_TOKEN|g" "$FILE"

          # 확인용 로그 (선택)
          echo "=== values.yaml after substitution ==="
          cat "$FILE"

      # -------------------------------------------------
      # 2️⃣ Docker 이미지 빌드 & GHCR 푸시
      # -------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
